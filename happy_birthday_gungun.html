<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mumma!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0533;
    font-family: 'Nunito', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* Confetti particles */
  .confetti-wrap {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: fall linear infinite;
    opacity: 0;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Main scene */
  .scene {
    position: relative;
    width: 400px; height: 700px;
    z-index: 1;
  }

  /* Gungun photo - center background */
  .gungun-frame {
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 220px; height: 290px;
    border-radius: 50% 50% 0 0;
    overflow: hidden;
    border: 4px solid #ff85c8;
    box-shadow: 0 0 30px #ff85c880;
    animation: glow 2s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { box-shadow: 0 0 20px #ff85c860; }
    to   { box-shadow: 0 0 50px #ff85c8cc, 0 0 80px #ff44aa44; }
  }
  .gungun-frame img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
  }

  /* Cat frames */
  .cat {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #ffe066;
    box-shadow: 0 0 20px #ffe06680;
  }
  .cat img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  .cheenu { left: 10px; bottom: 180px; animation: bounce 2s ease-in-out infinite; }
  .lalo   { right: 10px; bottom: 180px; animation: bounce 2s ease-in-out infinite 0.3s; }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* Cat name labels */
  .cat-name {
    position: absolute;
    font-family: 'Baloo 2', cursive;
    font-size: 13px;
    font-weight: 800;
    color: #fff;
    background: #7c3aed;
    border-radius: 20px;
    padding: 2px 10px;
    text-align: center;
  }
  .cheenu-name { left: 18px; bottom: 165px; }
  .lalo-name   { right: 18px; bottom: 165px; }

  /* Speech / Thought bubbles */
  .bubble {
    position: absolute;
    background: white;
    border-radius: 18px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #2d0060;
    line-height: 1.4;
    max-width: 150px;
    text-align: center;
    opacity: 0;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: opacity 0.5s;
  }

  /* Thought bubble tail (dots) */
  .bubble.thought::before,
  .bubble.thought::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .bubble.thought::before { width:10px; height:10px; bottom:-12px; }
  .bubble.thought::after  { width:6px;  height:6px;  bottom:-20px; }

  /* Speech bubble tail */
  .bubble.speech-left::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 20px;
    border-width: 10px 8px 0;
    border-style: solid;
    border-color: white transparent transparent;
  }
  .bubble.speech-right::after {
    content: '';
    position: absolute;
    bottom: -10px; right: 20px;
    border-width: 10px 8px 0;
    border-style: solid;
    border-color: white transparent transparent;
  }

  /* Bubble positions */
  .b1 { left: 5px;  bottom: 310px; }
  .b1.thought::before { left: 30px; }
  .b1.thought::after  { left: 38px; }

  .b2 { right: 5px; bottom: 310px; text-align:right; }
  .b2.thought::before { right: 30px; }
  .b2.thought::after  { right: 38px; }

  .b3 { left: 5px;  bottom: 430px; }
  .b3.thought::before { left: 30px; }
  .b3.thought::after  { left: 38px; }

  .b4 {
    left: 50%; transform: translateX(-50%);
    bottom: 530px;
    max-width: 280px;
    background: linear-gradient(135deg, #ff85c8, #ffcc00);
    color: #2d0060;
    font-size: 16px;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    border-radius: 24px;
    box-shadow: 0 0 30px #ff85c880;
  }

  /* Title */
  .title {
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    font-family: 'Baloo 2', cursive;
    font-size: 22px;
    font-weight: 800;
    color: #ffe066;
    text-shadow: 0 0 20px #ffe06680;
    white-space: nowrap;
    opacity: 0;
    animation: fadeIn 0.6s forwards;
    animation-delay: 0.2s;
  }

  /* Hearts floating */
  .heart {
    position: absolute;
    font-size: 20px;
    opacity: 0;
    animation: floatUp 1.5s ease-out forwards;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(0.8); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .visible { opacity: 1 !important; }
  .pop { animation: pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards !important; opacity: 1 !important; }

  @keyframes pop {
    0%   { transform: scale(0.3); opacity: 0; }
    70%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1);   opacity: 1; }
  }

  .b4.pop { transform: translateX(-50%) scale(1) !important; }
  @keyframes popCenter {
    0%   { transform: translateX(-50%) scale(0.3); opacity: 0; }
    70%  { transform: translateX(-50%) scale(1.1); opacity: 1; }
    100% { transform: translateX(-50%) scale(1);   opacity: 1; }
  }
  .b4.pop { animation: popCenter 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards !important; opacity:1 !important; }

</style>
</head>

  <div class="cat-name lalo-name">Lalo 🧡</div>

  <!-- Bubbles -->
  <div class="bubble thought b1" id="b1">Hmm... what's today's date? 🤔</div>
  <div class="bubble thought b2" id="b2">Ohoho... feels like something special... ✨</div>
  <div class="bubble speech-left b3" id="b3">Wait— is today Mumma's birthday?! 🎂</div>
  <div class="bubble b4" id="b4">🎉 HAPPY BIRTHDAY MUMMA!! 🎂🎉<br>— Cheenu & Lalo 🖤🧡</div>
</div>

<script>
// Confetti
const colors = ['#ff85c8','#ffe066','#a78bfa','#34d399','#60a5fa','#fb923c'];
const wrap = document.getElementById('confetti');
for(let i=0;i<40;i++){
  const d = document.createElement('div');
  d.className = 'dot';
  d.style.cssText = `left:${Math.random()*100}%;background:${colors[i%colors.length]};
    animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;
    width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;`;
  wrap.appendChild(d);
}

// Sequence
const seq = [
  [1000,  'b1'],
  [3000,  'b2'],
  [5500,  'b3'],
  [8000,  'b4'],
];

seq.forEach(([t, id]) => {
  setTimeout(() => {
    const el = document.getElementById(id);
    el.classList.add('pop');
    // spawn hearts near b4
    if(id === 'b4') spawnHearts();
  }, t);
});

function spawnHearts() {
  const emojis = ['❤️','🎂','🎉','✨','🥳'];
  for(let i=0;i<8;i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = emojis[i%emojis.length];
      h.style.cssText = `left:${20+Math.random()*60}%;bottom:${50+Math.random()*30}%;animation-delay:0s;`;
      document.querySelector('.scene').appendChild(h);
      setTimeout(() => h.remove(), 1600);
    }, i * 200);
  }
}
</script>
